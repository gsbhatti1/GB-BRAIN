# GB-BRAIN — logrotate configuration
# =====================================
# Rotates all log files under /var/log/gb-brain/
#
# Install:
#   sudo cp /opt/gb-brain/vps/logrotate.conf /etc/logrotate.d/gb-brain
#   sudo logrotate --debug /etc/logrotate.d/gb-brain   # dry-run test
#   sudo logrotate --force /etc/logrotate.d/gb-brain   # force first rotation

/var/log/gb-brain/*.log {
    # Rotate every day
    daily

    # Keep 14 days of archived logs
    rotate 14

    # Compress rotated logs with gzip
    compress

    # Don't compress the most-recently-rotated file (gives one day to finish writing)
    delaycompress

    # Don't error if a log file is missing
    missingok

    # Don't rotate empty log files
    notifempty

    # Truncate the log file in place after copying (avoids PID/fd issues)
    copytruncate

    # Date-stamped archive filenames: observer.log-2026-03-28.gz
    dateext
    dateformat -%Y-%m-%d

    # Postrotate: restart supervisor services so they reopen log file handles.
    # copytruncate above usually makes this unnecessary, but included for safety.
    postrotate
        /usr/bin/supervisorctl restart all > /dev/null 2>&1 || true
    endscript
}
