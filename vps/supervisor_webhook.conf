; GB-BRAIN — Supervisor config for TradingView webhook listener
; ==============================================================
; Manages the Flask/FastAPI webhook receiver that accepts inbound
; TradingView alerts and forwards them to the signal pipeline.
;
; Install: sudo cp this /etc/supervisor/conf.d/gb-webhook.conf
;          sudo supervisorctl reread && sudo supervisorctl update

[program:gb-webhook]

; --- Command & working directory ---
command=/opt/gb-brain/venv/bin/python /opt/gb-brain/webhook/tv_listener.py
directory=/opt/gb-brain

; --- Process lifecycle ---
autostart=true
autorestart=true
startsecs=5
startretries=5
stopwaitsecs=30
killasgroup=true
stopasgroup=true

; --- User ---
user=gb

; --- Environment ---
environment=PATH="/opt/gb-brain/venv/bin:%(ENV_PATH)s",PYTHONUNBUFFERED="1"

; --- Logging ---
stdout_logfile=/var/log/gb-brain/webhook.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5

stderr_logfile=/var/log/gb-brain/webhook_err.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=3

; --- Priority (start webhook before observer so it can receive signals) ---
priority=90
